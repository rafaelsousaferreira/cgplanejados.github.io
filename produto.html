<div id="nav-slot" data-active="produtos"></div>

<nav class="crumb" aria-label="Breadcrumb">

<main id="main">
  <div id="loading" style="text-align:center;padding:6rem 2rem;color:var(--ink-3);">
    <p style="font-family:var(--serif);font-size:1.6rem;color:var(--ink);">Carregando peça…</p>
  </div>

  <div id="product-content" style="display:none;">
    <div class="container">
      <div class="product-detail">
        <!-- Galeria -->
        <div>

          <div class="gallery-thumbs" id="gallery-thumbs"></div>
        </div>

        <!-- Info -->
        <div>

          <h1 class="product-title" id="product-title"></h1>
          <div class="product-tags" id="product-tags"></div>

          <div class="price-box">

            <div class="installments" id="product-installments"></div>
            <div class="stock" id="product-stock"></div>
            <div class="delivery-info" id="delivery-info"></div>
          </div>

              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 0 0 2 1.6h9.7a2 2 0 0 0 2-1.6L23 6H6"/></svg>
              Ver no Mercado Livre
            </a>
          </div>

          <div class="description">
            <h3>Sobre esta peça</h3>
            <div id="product-description"></div>
          </div>

          <h3 style="font-family:var(--sans);font-size:0.82rem;letter-spacing:0.16em;text-transform:uppercase;margin:2rem 0 1rem;color:var(--ink-3);font-weight:600;">Especificações</h3>
          <div class="specs" id="product-specs"></div>

          <div class="share">

            </button>
            <button type="button" class="card-btn" data-share="pinterest" aria-label="Compartilhar no Pinterest">
